<!DOCTYPE html>
<html>
<head>
<title>Debt Dashboard PRO</title>
<style>
body { background:#111; color:white; font-family:sans-serif; padding:20px;}
.card { background:#222; padding:15px; margin-bottom:10px; border-radius:10px;}
input { width:100%; margin:5px 0; padding:8px;}
button { padding:10px; margin-top:10px;}
</style>
</head>
<body>

<h1>Debt Dashboard PRO</h1>

<div id="debts"></div>

<button onclick="addDebt()">Add Debt</button>
<button onclick="save()">Save Changes</button>

<script>
let debts = [];

function render() {
    const container = document.getElementById("debts");
    container.innerHTML = "";
    debts.forEach((d, i) => {
        container.innerHTML += `
        <div class="card">
            <input placeholder="Name" value="${d.name}" onchange="update(${i}, 'name', this.value)">
            <input placeholder="Balance" value="${d.balance}" onchange="update(${i}, 'balance', this.value)">
            <input placeholder="APR" value="${d.rate}" onchange="update(${i}, 'rate', this.value)">
            <input placeholder="Payment" value="${d.payment}" onchange="update(${i}, 'payment', this.value)">
            <input placeholder="Due Day" value="${d.due_day}" onchange="update(${i}, 'due_day', this.value)">
        </div>`;
    });
}

function update(i, key, val) {
    debts[i][key] = val;
}

function addDebt() {
    debts.push({name:"", balance:0, rate:0, payment:0, due_day:1, paid:0, credit_limit:0});
    render();
}

function save() {
    fetch("/save_debts", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(debts)
    }).then(()=>alert("Saved"));
}

fetch("/get_debts").then(r=>r.json()).then(d=>{debts=d; render();});
</script>

</body>
</html>
