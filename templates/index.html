
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Dashboard</title>
<style>
body{background:#0b1628;color:white;font-family:sans-serif;padding:20px;}
.card{background:#111;padding:15px;border-radius:12px;margin-bottom:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
input{width:100%;padding:8px;margin-top:5px;background:#000;color:white;border:1px solid #333;}
button{padding:10px;margin-top:10px;}
.good{color:#22c55e}
.warn{color:#f59e0b}
.bad{color:#ef4444}
</style>
</head>
<body>

<h2>Debt Dashboard Pro</h2>

<div class="grid">
<div class="card">Total Debt: <span id="total"></span></div>
<div class="card">Utilization: <span id="util"></span></div>
</div>

<div id="debts"></div>

<button onclick="addDebt()">Add Debt</button>

<script>
let debts=[];

function utilClass(p){
 if(p<10)return "good";
 if(p<=30)return "warn";
 return "bad";
}

function calc(){
 let total=0,bal=0,lim=0;
 debts.forEach(d=>{
  if(!d.paid) total+=Number(d.balance);
  if(d.credit_limit>0){
   bal+=Number(d.balance);
   lim+=Number(d.credit_limit);
  }
 });
 let util=lim? (bal/lim*100):0;

 document.getElementById("total").innerText="$"+total.toFixed(0);
 document.getElementById("util").innerHTML="<span class='"+utilClass(util)+"'>"+util.toFixed(0)+"%</span>";
}

function render(){
 document.getElementById("debts").innerHTML=debts.map((d,i)=>`
 <div class="card">
 ${d.name||"Debt"} (${d.paid?"PAID":""})<br>
 <input value="${d.name}" placeholder="Name" oninput="upd(${i},'name',this.value)">
 <input type="number" value="${d.balance}" placeholder="Balance" oninput="upd(${i},'balance',this.value)">
 <input type="number" value="${d.credit_limit}" placeholder="Limit" oninput="upd(${i},'credit_limit',this.value)">
 <input type="number" value="${d.payment}" placeholder="Payment" oninput="upd(${i},'payment',this.value)">
 <input type="number" value="${d.due_day||''}" placeholder="Due Day" oninput="upd(${i},'due_day',this.value)">
 <input type="checkbox" ${d.paid?'checked':''} onchange="upd(${i},'paid',this.checked)"> Paid
 <button onclick="del(${i})">Delete</button>
 </div>`).join("");
 calc();
}

function upd(i,k,v){
 debts[i][k]= (k=="paid")?v:Number(v)||v;
 save(); render();
}

function addDebt(){
 debts.push({name:"",balance:0,rate:0,payment:0,due_day:null,paid:false,credit_limit:0});
 render(); save();
}

function del(i){
 debts.splice(i,1);
 render(); save();
}

function save(){
 fetch("/save_debts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(debts)});
}

function load(){
 fetch("/get_debts").then(r=>r.json()).then(d=>{debts=d; render();});
}

load();
</script>

</body>
</html>
