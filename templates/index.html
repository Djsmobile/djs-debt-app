<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    background: linear-gradient(135deg,#0f172a,#1e3a8a);
    color: white;
    font-family: Arial;
    padding:20px;
}
button {
    background:#2563eb;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:6px;
    margin-right:5px;
    cursor:pointer;
}
.card {
    background:#111827;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
input {
    width:80px;
    margin:3px;
}
</style>
</head>

<body>

<h1>Debt Dashboard PRO</h1>

<button onclick="addRow()">Add</button>
<button onclick="save()">Save</button>

<div id="list"></div>

<script>
let debts = []

function addRow(d={}) {
    debts.push({
        name:d.name||"",
        balance:d.balance||"",
        rate:d.rate||"",
        payment:d.payment||"",
        due_day:d.due_day||"",
        paid:d.paid||0,
        credit_limit:d.credit_limit||""
    })
    render()
}

function render() {
    let html=""
    debts.forEach((d,i)=>{
        html+=`
        <div class="card">
            <input placeholder="Name" value="${d.name}" onchange="debts[${i}].name=this.value">
            <input placeholder="Bal" value="${d.balance}" onchange="debts[${i}].balance=this.value">
            <input placeholder="Rate" value="${d.rate}" onchange="debts[${i}].rate=this.value">
            <input placeholder="Pay" value="${d.payment}" onchange="debts[${i}].payment=this.value">
            <input placeholder="Due" value="${d.due_day}" onchange="debts[${i}].due_day=this.value">
        </div>`
    })
    document.getElementById("list").innerHTML = html
}

function load() {
    fetch("/get_debts")
    .then(r=>r.json())
    .then(data=>{
        debts=data
        render()
    })
}

function save() {
    fetch("/save",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(debts)
    }).then(()=>alert("Saved"))
}

load()
</script>

</body>
</html>
