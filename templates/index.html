<!DOCTYPE html>
<html>
<head>
<title>Debt Dashboard PRO</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

button {
    padding: 10px 15px;
    margin-right: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
}

input {
    width: 100%;
    margin-top: 6px;
    margin-bottom: 10px;
    padding: 8px;
    background: #334155;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>

</head>

<body>

<h1>Debt Dashboard PRO</h1>

<button onclick="add()">Add</button>
<button onclick="save()">Save</button>

<div id="list"></div>

<script>

let debts = [];

function render() {
    let html = "";

    debts.forEach((d, i) => {
        html += `
        <div class="card">
            <input placeholder="Name" value="${d.name || ''}" onchange="debts[${i}].name=this.value">
            <input placeholder="Balance" value="${d.balance || ''}" onchange="debts[${i}].balance=this.value">
            <input placeholder="Rate %" value="${d.rate || ''}" onchange="debts[${i}].rate=this.value">
            <input placeholder="Payment" value="${d.payment || ''}" onchange="debts[${i}].payment=this.value">
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

function add() {
    debts.push({});
    render();
}

function save() {
    fetch("/save_debts", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(debts)
    })
    .then(() => alert("Saved"));
}

// 🔥 THIS IS WHAT WAS BROKEN BEFORE
fetch("/get_debts")
    .then(res => res.json())
    .then(data => {
        debts = data;
        render();
    });

</script>

</body>
</html>
