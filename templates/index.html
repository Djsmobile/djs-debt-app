<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Dashboard</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px;}
.card { background:#222; padding:15px; margin-bottom:10px; border-radius:8px;}
input { width:100%; padding:8px; margin:5px 0; }
button { padding:10px; width:100%; }
</style>
</head>
<body>

<h2>Debt Dashboard</h2>

<div id="debts"></div>

<button onclick="addDebt()">Add Debt</button>

<script>
let debts = [];

function render() {
    let container = document.getElementById("debts");
    container.innerHTML = "";
    debts.forEach((d,i)=>{
        container.innerHTML += `
        <div class="card">
            <input value="${d.name}" onchange="update(${i},'name',this.value)">
            <input value="${d.balance}" onchange="update(${i},'balance',this.value)">
            <input value="${d.rate}" onchange="update(${i},'rate',this.value)">
            <input value="${d.payment}" onchange="update(${i},'payment',this.value)">
        </div>`;
    });
}

function update(i,key,val){
    debts[i][key]=val;
    save();
}

function addDebt(){
    debts.push({name:"",balance:0,rate:0,payment:0});
    render();
    save();
}

function save(){
    fetch("/save_debts",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(debts)});
}

function load(){
    fetch("/get_debts").then(r=>r.json()).then(data=>{
        debts = data.map(d=>({
            name:d[1], balance:d[2], rate:d[3], payment:d[4]
        }));
        render();
    });
}

load();
</script>

</body>
</html>
