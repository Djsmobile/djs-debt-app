<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Dashboard</title>
<style>
body{background:#0a0a0a;color:#e5e5e5;font-family:monospace;padding:20px;}
.card{background:#111;border:1px solid #222;padding:15px;margin-bottom:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
input{width:100%;background:black;color:#0f0;border:1px solid #333;padding:8px;}
button{padding:8px;background:#0f0;color:black;border:none;margin-top:5px;}
.delete{background:red;color:white;}
.good{color:#0f0}
.warn{color:#ff0}
.bad{color:#f00}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
</style>
</head>
<body>

<h2>DEBT COMMAND CENTER</h2>

<div class="grid">
<div class="card">TOTAL: <span id="total"></span></div>
<div class="card">UTIL: <span id="util"></span></div>
</div>

<div id="debts"></div>

<button onclick="addDebt()">+ ADD</button>

<script>
let debts=[];

function utilClass(p){
 if(p<10)return "good";
 if(p<=30)return "warn";
 return "bad";
}

function calc(){
 let total=0,bal=0,lim=0;
 debts.forEach(d=>{
  if(!d.paid) total+=Number(d.balance);
  if(d.credit_limit>0){
   bal+=Number(d.balance);
   lim+=Number(d.credit_limit);
  }
 });
 let util=lim?(bal/lim*100):0;

 document.getElementById("total").innerText="$"+total.toFixed(0);
 document.getElementById("util").innerHTML="<span class='"+utilClass(util)+"'>"+util.toFixed(0)+"%</span>";
}

function render(){
 document.getElementById("debts").innerHTML=debts.map((d,i)=>`
 <div class="card">
 <div class="row">
 <input value="${d.name}" placeholder="NAME" oninput="upd(${i},'name',this.value)">
 <input type="number" value="${d.balance}" placeholder="BAL" oninput="upd(${i},'balance',this.value)">
 <input type="number" value="${d.credit_limit}" placeholder="LIMIT" oninput="upd(${i},'credit_limit',this.value)">
 <input type="number" value="${d.rate}" placeholder="APR" oninput="upd(${i},'rate',this.value)">
 <input type="number" value="${d.payment}" placeholder="PAY" oninput="upd(${i},'payment',this.value)">
 <input type="number" value="${d.due_day||''}" placeholder="DUE" oninput="upd(${i},'due_day',this.value)">
 <input type="checkbox" ${d.paid?'checked':''} onchange="upd(${i},'paid',this.checked)">
 </div>
 <button class="delete" onclick="del(${i})">DELETE</button>
 </div>`).join("");
 calc();
}

function upd(i,k,v){
 debts[i][k]=(k=="paid")?v:Number(v)||v;
 save(); render();
}

function addDebt(){
 debts.push({name:"",balance:0,rate:0,payment:0,due_day:null,paid:false,credit_limit:0});
 render(); save();
}

function del(i){
 debts.splice(i,1);
 render(); save();
}

function save(){
 fetch("/save_debts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(debts)});
}

function load(){
 fetch("/get_debts").then(r=>r.json()).then(d=>{debts=d; render();});
}

load();
</script>

</body>
</html>
