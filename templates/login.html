<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Dashboard Login</title>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0b1628;
      --panel: rgba(16,24,39,0.96);
      --line: rgba(148,163,184,0.14);
      --text: #e6eef8;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent2: #2563eb;
      --shadow: 0 20px 50px rgba(0,0,0,0.38);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.10), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }
    .shell {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, rgba(16,24,39,0.96), rgba(12,19,33,0.98));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.18);
      color: #bed7ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #cdd8e7;
      font-weight: 700;
    }
    input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(2, 6, 23, 0.64);
      color: var(--text);
      border-radius: 16px;
      padding: 16px 16px;
      font-size: 16px;
      outline: none;
    }
    input:focus {
      border-color: rgba(59,130,246,0.55);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.14);
    }
    button {
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: 16px;
      padding: 16px;
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.34);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="eyebrow">Secure Access</div>
    <h1>Debt Dashboard</h1>
    <p>Track balances, due day alerts, payment strategy, and paid status across phone and desktop.</p>

    <form method="POST">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
      <button type="submit">Enter Dashboard</button>
    </form>
  </div>
</body>
</html>
