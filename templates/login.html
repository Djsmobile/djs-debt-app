<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Dashboard Login</title>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0c1729;
      --card: rgba(15, 23, 42, 0.78);
      --line: rgba(148, 163, 184, 0.16);
      --text: #e5edf7;
      --muted: #8fa2bc;
      --accent: #3b82f6;
      --accent2: #22c55e;
      --danger: #ef4444;
      --shadow: 0 20px 55px rgba(0, 0, 0, 0.40);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.20), transparent 28%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.16), transparent 22%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.18);
      color: #b9d2ff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }

    .sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #c8d4e5;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="password"] {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.70);
      color: var(--text);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="password"]:focus {
      border-color: rgba(59,130,246,0.55);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.16);
      transform: translateY(-1px);
    }

    .btn {
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.35);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="badge">Secure Access</div>
    <h1>Debt Dashboard</h1>
    <div class="sub">A cleaner, app-style version of your synced debt tracker. Login to continue.</div>

    <form method="POST">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
      <button class="btn" type="submit">Enter Dashboard</button>
    </form>

    <div class="footer">Your existing sync, save, and login flow stays intact.</div>
  </div>
</body>
</html>
