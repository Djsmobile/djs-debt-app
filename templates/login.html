<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Debt Dashboard Login</title>
<style>
:root{--bg:#08111f;--bg2:#0d1b2f;--panel:#111c2e;--line:rgba(255,255,255,.08);--text:#eef4ff;--muted:#9cb0cc;--accent:#27c46a;--accent2:#18894a}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(39,196,106,.10), transparent 24%),radial-gradient(circle at bottom right, rgba(59,130,246,.12), transparent 24%),linear-gradient(180deg,var(--bg),var(--bg2));display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:430px;background:rgba(17,28,46,.94);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 18px 44px rgba(0,0,0,.35)}
.tag{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(39,196,106,.12);color:#b9ffd4;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(39,196,106,.2)}
h1{margin:18px 0 10px;font-size:34px;line-height:1.02}p{margin:0 0 22px;color:var(--muted);line-height:1.5}label{display:block;margin-bottom:8px;font-weight:700;font-size:13px}
input{width:100%;padding:15px 16px;border-radius:16px;border:1px solid var(--line);background:#091220;color:var(--text);font-size:16px;outline:none}
input:focus{border-color:#27c46a;box-shadow:0 0 0 4px rgba(39,196,106,.12)}
button{width:100%;margin-top:18px;padding:15px 16px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-weight:800;font-size:15px;cursor:pointer}
</style></head>
<body><div class="card"><div class="tag">Secure Access</div><h1>Debt Dashboard</h1><p>Now with paycheck split budgeting, monthly bill tracking, and paid-off tracking.</p><form method="POST"><label for="password">Password</label><input id="password" name="password" type="password" placeholder="Enter password" required autocomplete="current-password"><button type="submit">Enter Dashboard</button></form></div></body></html>
