<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Dashboard Login</title>
<style>
:root{
  --bg:#090b10;
  --panel:#121721;
  --border:#2a3446;
  --text:#eef3fb;
  --muted:#97a3b8;
  --green:#3ddc97;
  --red:#ff6b6b;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
  background:radial-gradient(circle at top, #111827 0%, #090b10 45%);
  color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
.card{
  width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);
  border-radius:22px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.38)
}
h1{margin:0 0 8px;font-size:1.9rem}
p{margin:0 0 20px;color:var(--muted)}
label{display:block;margin-bottom:8px;color:var(--muted);font-size:.85rem;text-transform:uppercase;letter-spacing:.08em}
input{
  width:100%;padding:14px 14px;border-radius:14px;border:1px solid var(--border);
  background:#0d131d;color:var(--text);font-size:1rem;outline:none;margin-bottom:14px
}
input:focus{border-color:#6aa9ff;box-shadow:0 0 0 3px rgba(106,169,255,.15)}
button{
  width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--green),#68f0b7);
  color:#07140e;font-weight:800;font-size:1rem;cursor:pointer
}
.error{
  margin-bottom:14px;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,107,107,.35);
  background:rgba(255,107,107,.12);color:#ffb1b1
}
</style>
</head>
<body>
  <form class="card" method="POST">
    <h1>Debt Dashboard</h1>
    <p>Sign in to manage balances, due dates, alerts, and utilization.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit">Enter Dashboard</button>
  </form>
</body>
</html>
