<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body {background:#0b0b0b;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;}
.box {background:#1a1a1a;padding:30px;border-radius:12px;width:300px;text-align:center;}
input {width:100%;padding:10px;margin-top:10px;background:#111;border:1px solid #333;color:#fff;}
button {margin-top:15px;width:100%;padding:10px;background:#00c853;border:none;color:#fff;font-weight:bold;}
</style>
</head>
<body>
<div class="box">
<h2>Debt Dashboard</h2>
<form method="POST">
<input type="password" name="password" placeholder="Enter Password">
<button type="submit">Enter</button>
</form>
</div>
</body>
</html>
